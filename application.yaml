spring:
  application:
    name: transcended

  datasource:
    url: jdbc:postgresql://localhost:5433/transcended
    username: trans
    password: trans
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080


