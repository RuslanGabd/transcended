spring:
  application:
    name: transcended

  datasource:
    url: ${DB_URL:jdbc:postgresql://toolcompany.zapto.org:5433/alertsbot}
    username: ${DB_USERNAME:alertsbot}
    password: ${DB_PASSWORD:alertsbot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080


